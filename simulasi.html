<div class="sikam-simulasi-wrapper">
    <style>
        .sikam-simulasi-wrapper {
            --sikam-red: #c53030;
            --sikam-blue: #3182ce;
            --sikam-gray-bg: #f8fafc;
            --sikam-border: #cbd5e1;
            --sikam-text: #2d3748;
            
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            max-width: 1050px;
            margin: 20px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            box-sizing: border-box;
        }
        .sikam-simulasi-wrapper * { box-sizing: border-box; }
        
        .sikam-header-title {
            text-align: center;
            color: var(--sikam-red);
            font-size: 2em;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }
        
        .sikam-layout-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 25px;
        }
        
        @media (max-width: 768px) {
            .sikam-layout-grid { grid-template-columns: 1fr; }
        }
        
        /* Panel Input Parameter */
        .sikam-panel-input {
            background: var(--sikam-gray-bg);
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
        }
        
        .sikam-group {
            margin-bottom: 18px;
        }
        
        .sikam-group label {
            display: block;
            font-weight: 600;
            color: var(--sikam-text);
            margin-bottom: 6px;
            font-size: 0.95em;
        }
        
        .sikam-group label .sikam-badge {
            float: right;
            color: var(--sikam-red);
            font-weight: 700;
        }
        
        .sikam-dropdown, .sikam-slider {
            width: 100%;
        }
        
        .sikam-dropdown {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid var(--sikam-border);
            background-color: #ffffff;
            font-size: 0.95em;
            color: #334155;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .sikam-dropdown:focus {
            border-color: var(--sikam-red);
        }
        
        .sikam-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: var(--sikam-border);
            outline: none;
            margin-top: 8px;
        }
        
        .sikam-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--sikam-blue);
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .sikam-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--sikam-red);
        }
        
        /* Panel Output Hasil Perhitungan */
        .sikam-panel-output {
            border: 2px solid var(--sikam-red);
            border-radius: 10px;
            padding: 25px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: center;
        }
        
        .sikam-output-head {
            font-size: 1.25em;
            font-weight: 700;
            color: #1a202c;
            margin-top: 0;
            margin-bottom: 10px;
        }
        
        .sikam-score-num {
            font-size: 4.5em;
            font-weight: 900;
            color: var(--sikam-red);
            margin: 5px 0;
            line-height: 1;
        }
        
        .sikam-status-lbl {
            font-size: 1.15em;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .sikam-box-desc {
            text-align: left;
            font-size: 0.95em;
            line-height: 1.6;
            color: #4a5568;
        }
        
        .sikam-box-desc h5 {
            margin: 15px 0 5px 0;
            color: var(--sikam-text);
            font-weight: 700;
            font-size: 1.05em;
        }
        
        .clr-safe { color: #38a169; }
        .clr-warn { color: #dd6b20; }
        .clr-danger { color: #e53e3e; }
    </style>

    <div class="sikam-header-title">SIKAM KEMALA: Analisis Risiko Bencana</div>
    
    <div class="sikam-layout-grid">
        <div class="sikam-panel-input">
            <div class="sikam-group">
                <label for="sk-jenis">Jenis Bencana (Kategori Lengkap UU No. 24/2007):</label>
                <select id="sk-jenis" class="sikam-dropdown" onchange="hitungSimulasiSikam()">
                    <optgroup label="Bencana Alam">
                        <option value="Gempabumi Tektonik">🏢 Gempabumi Tektonik</option>
                        <option value="Tsunami">🌊 Tsunami</option>
                        <option value="Erupsi Gunungapi">🌋 Erupsi Gunungapi</option>
                        <option value="Banjir & Banjir Bandang">🌧️ Banjir & Banjir Bandang</option>
                        <option value="Tanah Longsor">⛰️ Tanah Longsor</option>
                        <option value="Kebakaran Hutan/Lahan">🔥 Kebakaran Hutan/Lahan (Karhutla)</option>
                        <option value="Angin Puting Beliung / Siklon">🌪️ Angin Puting Beliung / Siklon</option>
                        <option value="Kekeringan Ekstrem">☀️ Kekeringan Ekstrem</option>
                        <option value="Abrasi & Gelombang Pasang">🌊 Abrasi Pantai & Gelombang Pasang</option>
                    </optgroup>
                    <optgroup label="Bencana Nonalam">
                        <option value="Bencana Nonalam (Kegagalan Teknologi/Industri)">☣️ Bencana Nonalam (Gagal Teknologi/Industri)</option>
                        <option value="Bencana Nonalam (Epidemi/Wabah Penyakit)">🦠 Bencana Nonalam (Epidemi/Wabah Penyakit)</option>
                    </optgroup>
                    <optgroup label="Bencana Sosial">
                        <option value="Bencana Sosial (Konflik Sosial/Kerusuhan)">👥 Bencana Sosial (Konflik Sosial/Huru-hara)</option>
                        <option value="Bencana Sosial (Aksi Terorisme)">🪖 Bencana Sosial (Sabotase/Aksi Teror)</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="sikam-group">
                <label for="sk-kekuatan">Kekuatan Bencana (Skala Dampak/Intensitas 1-10): <span class="sikam-badge" id="lbl-kekuatan">5</span></label>
                <input type="range" id="sk-kekuatan" class="sikam-slider" min="1" max="10" value="5" oninput="ubahSliderSikam('kekuatan', this.value)">
            </div>
            
            <div class="sikam-group">
                <label for="sk-medan">Kondisi Medan Penyelamatan / Hambatan Jalur:</label>
                <select id="sk-medan" class="sikam-dropdown" onchange="hitungSimulasiSikam()">
                    <option value="1">Sangat Aman (Jalur Evakuasi Lebar & Landai)</option>
                    <option value="2">Aman (Jalur Evakuasi Normal)</option>
                    <option value="4">Cukup Berbahaya (Topografi Berbukit/Bottleneck/Bahaya Tak Terduga)</option>
                    <option value="5">Sangat Berbahaya (Akses Rusak/Jembatan Putus/Barikade/Bahaya Merembet Luas Tak Terduga)</option>
                </select>
            </div>
            
            <div class="sikam-group">
                <label for="sk-kerentanan">Kerentanan Fisik Wilayah (Struktur Kawasan 1-10): <span class="sikam-badge" id="lbl-kerentanan">5</span></label>
                <input type="range" id="sk-kerentanan" class="sikam-slider" min="1" max="10" value="5" oninput="ubahSliderSikam('kerentanan', this.value)">
            </div>
            
            <div class="sikam-group">
                <label for="sk-populasi">Populasi Terancam (Jiwa): <span class="sikam-badge" id="lbl-populasi">500</span></label>
                <input type="range" id="sk-populasi" class="sikam-slider" min="50" max="5000" step="50" value="500" oninput="ubahSliderSikam('populasi', this.value)">
            </div>
            
            <div class="sikam-group">
                <label for="sk-ketahanan">Kekuatan Manusia / Kapasitas Ketahanan (1-10): <span class="sikam-badge" id="lbl-ketahanan">5</span></label>
                <input type="range" id="sk-ketahanan" class="sikam-slider" min="1" max="10" value="5" oninput="ubahSliderSikam('ketahanan', this.value)">
            </div>
            
            <div class="sikam-group">
                <label for="sk-jarak">Jarak Manusia ke Titik Pusat Bencana (km): <span class="sikam-badge" id="lbl-jarak">10</span></label>
                <input type="range" id="sk-jarak" class="sikam-slider" min="1" max="100" value="10" oninput="ubahSliderSikam('jarak', this.value)">
            </div>
            
            <div class="sikam-group">
                <label for="sk-waktu">Waktu Kejadian Bencana:</label>
                <select id="sk-waktu" class="sikam-dropdown" onchange="hitungSimulasiSikam()">
                    <option value="pagi">Pagi Hari (06.00 - 12.00 WIB)</option>
                    <option value="siang">Siang - Sore (12.00 - 18.00 WIB)</option>
                    <option value="sore">Sore - Malam (18.00 - 24.00 WIB)</option>
                    <option value="malam">Malam - Dini Hari (00.00 - 06.00 WIB)</option>
                </select>
            </div>
        </div>
        
        <div class="sikam-panel-output">
            <div class="sikam-output-head">Skor Potensi Risiko Bencana</div>
            <div class="sikam-score-num" id="sk-score-val">0</div>
            <div class="sikam-status-lbl" id="sk-status-val">MEMPROSES DATA...</div>
            
            <div class="sikam-box-desc">
                <h5>Simpulan Akhir:</h5>
                <div id="sk-narasi-val">Menghitung model risiko kebencanaan keruangan...</div>
            </div>
        </div>
    </div>

    <script>
        function ubahSliderSikam(id, nilai) {
            document.getElementById('lbl-' + id).innerText = nilai;
            hitungSimulasiSikam();
        }

        function hitungSimulasiSikam() {
            const jenis = document.getElementById("sk-jenis").value;
            const kekuatan = parseInt(document.getElementById("sk-kekuatan").value);
            const medan = parseInt(document.getElementById("sk-medan").value);
            const kerentanan = parseInt(document.getElementById("sk-kerentanan").value);
            const populasi = parseInt(document.getElementById("sk-populasi").value);
            const ketahanan = parseInt(document.getElementById("sk-ketahanan").value);
            const jarak = parseInt(document.getElementById("sk-jarak").value);
            const waktu = document.getElementById("sk-waktu").value;

            // Logika Evaluasi Pembobotan Waktu Spasial
            let bobotWaktu = 1.0;
            let narasiWaktu = "";
            switch(waktu) {
                case "pagi":
                    bobotWaktu = 1.0;
                    narasiWaktu = "Kondisi waktu Pagi Hari sangat menguntungkan karena tingkat kesadaran individu maksimal dan mobilitas spasial tinggi.";
                    break;
                case "siang":
                    bobotWaktu = 1.1;
                    narasiWaktu = "Kondisi Siang-Sore hari berada pada mobilitas masyarakat puncak, struktur kesadaran spasial kolektif aktif, namun kerentanan penumpukan rute evakuasi (bottleneck) dapat terjadi.";
                    break;
                case "sore":
                    bobotWaktu = 1.3;
                    narasiWaktu = "Kondisi Sore-Malam membatasi visibilitas visual dan memperlambat koordinasi awal penyelamatan.";
                    break;
                case "malam":
                    bobotWaktu = 1.7; 
                    narasiWaktu = "Kondisi Malam-Dini Hari merupakan skenario terburuk secara spasial. Mayoritas warga tertidur, visibilitas nol, respon sistem peringatan dini krusial karena kesadaran mandiri berada di titik terendah.";
                    break;
            }

            // Logika Relasi Jarak Terbalik (Makin dekat jarak km, indeks bahaya melonjak)
            let faktorJarak = (105 - jarak) / 10; 
            let indeksBahaya = kekuatan * faktorJarak;
            let indeksKerentanan = kerentanan * (1 + (populasi / 5000)) * bobotWaktu;
            let indeksKapasitas = ketahanan * (6 - medan);

            let skorTotal = Math.round((indeksBahaya * indeksKerentanan) / indeksKapasitas);
            
            // Batasi rentang skor 1 - 100
            if (skorTotal > 100) skorTotal = 100;
            if (skorTotal < 1) skorTotal = 1;

            const scoreEl = document.getElementById("sk-score-val");
            const statusEl = document.getElementById("sk-status-val");
            const narasiEl = document.getElementById("sk-narasi-val");
            
            scoreEl.innerText = skorTotal;

            let statusText = "";
            let statusClass = "";
            let strategiMitigasi = "";

            if (skorTotal <= 35) {
                statusText = "POTENSI RISIKO RENDAH";
                statusClass = "clr-safe";
                strategiMitigasi = "Kondisi wilayah relatif stabil dan aman dikendalikan. Pertahankan ketahanan komunitas terstruktur melalui pemantauan berkala portal WebGIS.";
            } else if (skorTotal <= 70) {
                statusText = "POTENSI RISIKO SEDANG / WASPADA";
                statusClass = "clr-warn";
                strategiMitigasi = "Dibutuhkan kesiapsiagaan taktis. Koordinasi komunikasi darurat antarkelompok harus diaktifkan. Periksa keandalan rambu evakuasi horizontal di area perumahan.";
            } else {
                statusText = "POTENSI RISIKO TINGGI / KRITIS";
                statusClass = "clr-danger";
                strategiMitigasi = "Status kritis! Diperlukan aktivasi rencana kontinjensi darurat segera. Lakukan evakuasi mandiri terencana menjauhi zona merah dan manfaatkan koordinasi berbasis radio komunitas.";
            }

            statusEl.className = "sikam-status-lbl " + statusClass;
            statusEl.innerText = statusText;

            narasiEl.innerHTML = `
                Analisis spasial terhadap <strong>${jenis}</strong> dengan skala kekuatan <strong>${kekuatan}/10</strong> menunjukkan tingkat ancaman yang signifikan pada jarak <strong>${jarak} km</strong> dari pusat kejadian. <br><br>
                ${narasiWaktu} Dengan estimasi populasi terdampak sebanyak <strong>${populasi} jiwa</strong> dan indeks ketahanan internal bernilai <strong>${ketahanan}/10</strong>, pemodelan ini menghasilkan tingkat kerawanan kumulatif yang masuk dalam kategori <span class="${statusClass}"><strong>${statusText}</strong></span>.<br><br>
                <strong>Rekomendasi Manajemen Kebencanaan:</strong> ${strategiMitigasi}
            `;
        }

        // Menjalankan kalkulator otomatis saat kode disisipkan browser
        hitungSimulasiSikam();
    </script>
